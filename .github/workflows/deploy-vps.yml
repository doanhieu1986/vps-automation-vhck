name: VPS Automation - Deploy to GitHub Pages

on:
  push:
    paths:
      - 'scripts/fetch_vsd.py'
      - 'data/vsd_records.json'
      - 'web/vps_automation_vhck.html'
      - '.github/workflows/deploy-vps.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl

      - name: Fetch VSD data
        run: |
          python scripts/fetch_vsd.py > /tmp/vsd_output.json 2>&1
          cat /tmp/vsd_output.json

      - name: Load VSD data
        id: vsd_data
        run: |
          python3 << 'EOF'
          import json
          import os

          # Load vsd_records.json
          with open('data/vsd_records.json') as f:
            data = json.load(f)

          records_count = len(data.get('records', []))
          print(f"Records: {records_count}")

          # Set GitHub output
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"records_count={records_count}\n")
          EOF

      - name: Embed data into HTML
        run: |
          python3 << 'SCRIPT'
          import json
          import re
          import sys

          try:
            print("📝 Reading HTML file...")
            with open('web/vps_automation_vhck.html') as f:
              html_content = f.read()
            print(f"✓ HTML file size: {len(html_content)} bytes")

            print("📝 Reading JSON file...")
            with open('data/vsd_records.json') as f:
              vsd_data = json.load(f)

            records_count = len(vsd_data.get('records', []))
            print(f"✓ Loaded {records_count} records from JSON")

            # Remove old embedded data
            print("🧹 Removing old embedded data...")
            html_content = re.sub(r'<script>\s*window\.EMBEDDED_DATA = .*?</script>', '', html_content, flags=re.DOTALL)
            print("✓ Old embedded data removed")

            # Create and insert new embedded script
            print("📊 Creating new embedded script...")
            json_str = json.dumps(vsd_data)
            embedded = '\n    <script>\n      window.EMBEDDED_DATA = ' + json_str + ';\n      console.log("Embedded data loaded: ' + str(records_count) + ' records");\n    </script>'
            html_content = html_content.replace('</body>', embedded + '\n</body>')
            print(f"✓ Embedded script created ({len(json_str)} bytes of JSON)")

            print("💾 Writing updated HTML file...")
            with open('web/vps_automation_vhck.html', 'w') as f:
              f.write(html_content)
            print(f"✓ Updated HTML file written ({len(html_content)} bytes)")

            print(f"\n✅ SUCCESS: Embedded {records_count} records into HTML")
            sys.exit(0)
          except Exception as e:
            print(f"\n❌ ERROR: {str(e)}", file=sys.stderr)
            import traceback
            traceback.print_exc()
            sys.exit(1)
          SCRIPT

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          echo "📋 Checking for modified files..."
          git status --short

          echo "➕ Adding files to staging..."
          git add data/vsd_records.json data/vsd_records.xlsx web/vps_automation_vhck.html
          echo "✓ Files staged"

          echo "🔍 Checking staged changes..."
          git diff --cached --stat

          if git diff --quiet --cached; then
            echo "✅ No changes to commit"
          else
            echo "📝 Committing changes..."
            git commit -m "ci: update VSD data with embedded HTML (${{ steps.vsd_data.outputs.records_count }} records) - $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "✓ Changes committed"

            echo "🚀 Pushing to remote..."
            git push origin main
            echo "✓ Pushed to GitHub"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          force_orphan: false
          cname: false
